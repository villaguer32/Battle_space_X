<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Space Battle X - Multi-Bonus</title>
    <style>
        body { margin: 0; background: #050505; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; font-family: 'Segoe UI', Arial, sans-serif; }
        canvas { border: 3px solid #0ff; box-shadow: 0 0 20px rgba(0, 255, 255, 0.3); background: radial-gradient(circle at bottom, #020024, #020b3a, #000); }
    </style>
</head>
<body>

<canvas id="game" width="420" height="650"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

let state = "lobby"; 
let keys = {}, bullets = [], enemies = [], particles = [], stars = [], bonuses = [];
let enemyTimer = 0;

// ⚡ STATUS INDEPENDIENTES
let speedTimer = 0;
let multiTimer = 0;
const BONUS_DURATION = 400; 

// 🛡️ ESCUDO
let shieldReady = false, shieldActive = false, shieldTimer = 0, enemyKills = 0;

// 💾 DATOS
let save = JSON.parse(localStorage.getItem("spaceSave")) || { score: 0, owned: [true, false, false, false, false] };
let score = save.score;

const ships = [
    { color: "#00ffff", speed: 6, price: 0 },
    { color: "#ff4444", speed: 6, price: 100 },
    { color: "#00ff00", speed: 8, price: 250 },
    { color: "#ff00ff", speed: 7, price: 500 },
    { color: "#ff69b4", speed: 7, price: 1200 }
];

let shipIndex = 0;
const player = { x: 210, y: 560 };

for(let i=0; i<100; i++) stars.push({ x: Math.random()*420, y: Math.random()*650, s: Math.random()*3 + 1 });

// --- CLICS ---
canvas.addEventListener("mousedown", e => {
    const rect = canvas.getBoundingClientRect();
    const mx = e.clientX - rect.left;
    const my = e.clientY - rect.top;

    if(state === "lobby") {
        if(mx > 130 && mx < 290 && my > 420 && my < 465) startGame();
        if(Math.hypot(mx - 370, my - 580) < 25) state = "shop";
        if(mx > 50 && mx < 80 && my > 280 && my < 330) changeShip(-1);
        if(mx > 340 && mx < 370 && my > 280 && my < 330) changeShip(1);
    } else if(state === "shop") {
        if(mx > 110 && mx < 310 && my > 430 && my < 470) buyShip();
        if(my > 580) state = "lobby";
        if(mx > 50 && mx < 80 && my > 280 && my < 330) shipIndex = (shipIndex-1+ships.length)%ships.length;
        if(mx > 340 && mx < 370 && my > 280 && my < 330) shipIndex = (shipIndex+1)%ships.length;
    } else if(state === "gameover") state = "lobby";
});

document.addEventListener("keydown", e => {
    keys[e.key] = true;
    if(state === "game" && e.key === " ") shoot();
    if(state === "game" && e.key === "Control" && shieldReady) activateShield();
});
document.addEventListener("keyup", e => keys[e.key] = false);

function changeShip(dir) { do { shipIndex = (shipIndex + dir + ships.length) % ships.length; } while (!save.owned[shipIndex]); }
function saveGame() { save.score = score; localStorage.setItem("spaceSave", JSON.stringify(save)); }
function startGame() { bullets = []; enemies = []; particles = []; bonuses = []; enemyTimer = 0; speedTimer = 0; multiTimer = 0; shieldActive = false; shieldReady = false; enemyKills = 0; player.x = 210; state = "game"; }
function buyShip() { let s = ships[shipIndex]; if(!save.owned[shipIndex] && score >= s.price) { score -= s.price; save.owned[shipIndex] = true; saveGame(); } }

function shoot() {
    if(multiTimer > 0) {
        bullets.push({x: player.x - 15, y: player.y}, {x: player.x, y: player.y}, {x: player.x + 15, y: player.y});
    } else bullets.push({x: player.x, y: player.y});
}

function activateShield() { if(ships[shipIndex].color === "#ff69b4") { shieldActive = true; shieldReady = false; shieldTimer = 400; enemyKills = 0; } }

function explode(x, y, big = false) {
    for(let i=0; i<(big?40:15); i++) particles.push({ x, y, dx: (Math.random()-0.5)*6, dy: (Math.random()-0.5)*6, life: 30, c: big?"#ffaa00":"#fff" });
}

function drawShip(x, y, color, size, dir="up") {
    ctx.save(); ctx.translate(x, y); if(dir === "down") ctx.rotate(Math.PI);
    ctx.fillStyle = color; ctx.shadowBlur = 10; ctx.shadowColor = color;
    ctx.beginPath(); ctx.moveTo(0, -size); ctx.lineTo(size, size); ctx.lineTo(-size, size); ctx.closePath(); ctx.fill(); ctx.restore();
}

function loop() {
    ctx.clearRect(0,0,420,650);
    stars.forEach(s => { s.y += s.s; if(s.y > 650) s.y = 0; ctx.fillStyle = "white"; ctx.fillRect(s.x, s.y, 2, 2); });

    if(state === "lobby") {
        ctx.fillStyle = "white"; ctx.font = "bold 35px Arial"; ctx.fillText("SPACE BATTLE X", 65, 120);
        drawShip(210, 300, ships[shipIndex].color, 35);
        ctx.fillStyle = "#0ff"; ctx.fillText("<", 55, 310); ctx.fillText(">", 345, 310);
        ctx.fillStyle = "#0f0"; ctx.fillRect(130, 420, 160, 45);
        ctx.fillStyle = "black"; ctx.font = "bold 18px Arial"; ctx.fillText("¡JUGAR!", 175, 448);
        ctx.fillStyle = "orange"; ctx.beginPath(); ctx.arc(370, 580, 25, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = "black"; ctx.fillText("🛒", 358, 587);
        ctx.fillStyle = "yellow"; ctx.font = "20px Arial"; ctx.fillText("⭐ " + score, 20, 40);
        requestAnimationFrame(loop); return;
    }

    if(state === "shop") {
        ctx.fillStyle = "white"; ctx.font = "bold 28px Arial"; ctx.fillText("TIENDA", 160, 80);
        drawShip(210, 280, ships[shipIndex].color, 45);
        let s = ships[shipIndex];
        if(save.owned[shipIndex]) { ctx.fillStyle = "#0f0"; ctx.fillText("ADQUIRIDA", 150, 420); }
        else { ctx.fillStyle = "yellow"; ctx.fillText("💰 " + s.price, 180, 415); ctx.fillStyle = score >= s.price ? "#0ff" : "#444"; ctx.fillRect(110, 435, 200, 40); ctx.fillStyle = "white"; ctx.fillText("COMPRAR", 165, 460); }
        ctx.fillStyle = "#ff4444"; ctx.fillText("VOLVER", 175, 610);
        requestAnimationFrame(loop); return;
    }

    if(state === "gameover") {
        ctx.fillStyle = "red"; ctx.font = "bold 40px Arial"; ctx.fillText("GAME OVER", 90, 300);
        ctx.fillStyle = "white"; ctx.font = "20px Arial"; ctx.fillText("CLIC PARA VOLVER", 115, 350);
        requestAnimationFrame(loop); return;
    }

    // --- JUEGO ---
    let currentSpeed = ships[shipIndex].speed + (speedTimer > 0 ? 4 : 0);
    if(keys["ArrowLeft"] && player.x > 25) player.x -= currentSpeed;
    if(keys["ArrowRight"] && player.x < 395) player.x += currentSpeed;
    
    if(shieldActive) { ctx.strokeStyle = "#0ff"; ctx.lineWidth = 3; ctx.beginPath(); ctx.arc(player.x, player.y+5, 35, 0, Math.PI*2); ctx.stroke(); shieldTimer--; if(shieldTimer <= 0) shieldActive = false; }
    drawShip(player.x, player.y, ships[shipIndex].color, 20);

    // BARRAS DE TIEMPO INDEPENDIENTES
    if(speedTimer > 0) {
        ctx.fillStyle = "#0ff";
        ctx.fillRect(player.x - 30, player.y + 30, (speedTimer/BONUS_DURATION)*60, 5);
        speedTimer--;
    }
    if(multiTimer > 0) {
        ctx.fillStyle = "#f0f";
        ctx.fillRect(player.x - 30, player.y + 38, (multiTimer/BONUS_DURATION)*60, 5);
        multiTimer--;
    }

    bullets.forEach((b, i) => { b.y -= 10; ctx.fillStyle = "yellow"; ctx.fillRect(b.x-2, b.y, 4, 12); if(b.y < 0) bullets.splice(i, 1); });
    enemyTimer++; if(enemyTimer > 45) { enemies.push({x: Math.random()*380+20, y: -40}); enemyTimer = 0; }

    enemies.forEach((e, i) => {
        e.y += 3; drawShip(e.x, e.y, "#ff3333", 18, "down");
        if(Math.hypot(e.x - player.x, e.y - player.y) < 30) { if(shieldActive) { explode(e.x, e.y); enemies.splice(i,1); } else { explode(player.x, player.y, true); state = "gameover"; saveGame(); } }
        bullets.forEach((b, j) => {
            if(Math.hypot(e.x - b.x, e.y - b.y) < 20) { explode(e.x, e.y); enemies.splice(i,1); bullets.splice(j,1); score += 10; enemyKills++; if(enemyKills >= 12) shieldReady = true; if(Math.random() < 0.20) bonuses.push({x: e.x, y: e.y, type: Math.random()<0.5?"speed":"multi"}); }
        });
        if(e.y > 670) enemies.splice(i,1);
    });

    bonuses.forEach((bo, i) => {
        bo.y += 2; ctx.fillStyle = bo.type === "speed" ? "#0ff" : "#f0f"; ctx.fillRect(bo.x-10, bo.y-10, 20, 20);
        if(Math.hypot(bo.x - player.x, bo.y - player.y) < 30) { 
            if(bo.type === "speed") speedTimer = BONUS_DURATION; 
            else multiTimer = BONUS_DURATION; 
            bonuses.splice(i,1); 
        }
    });

    particles.forEach((p, i) => { p.x += p.dx; p.y += p.dy; p.life--; ctx.fillStyle = p.c; ctx.globalAlpha = p.life/30; ctx.fillRect(p.x, p.y, 3, 3); ctx.globalAlpha = 1; if(p.life <= 0) particles.splice(i,1); });

    ctx.fillStyle = "white"; ctx.font = "14px Arial"; ctx.fillText("SCORE: " + score, 10, 25);
    if(ships[shipIndex].color === "#ff69b4") { ctx.fillStyle = shieldReady ? "#0ff" : "#fff"; ctx.fillText(shieldReady ? "¡ESCUDO LISTO! (CTRL)" : "CARGA: " + enemyKills + "/12", 10, 45); }

    requestAnimationFrame(loop);
}
loop();
</script>
</body>
</html>
