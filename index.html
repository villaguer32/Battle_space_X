<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Space Battle X - Oficial</title>

<style>
:root {
    --blue: #00ffff;
    --pink: #ff00ff;
}

/* 🌌 FONDO */
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: black;
    color: white;
    overflow-x: hidden;
}

/* ESTRELLAS */
canvas {
    position: fixed;
    top: 0;
    left: 0;
    z-index: -1;
}

/* NAV */
nav {
    display: flex;
    justify-content: center;
    gap: 10px;
    padding: 15px;
    background: rgba(0,0,0,0.7);
    backdrop-filter: blur(10px);
    border-bottom: 1px solid var(--blue);
}

nav button {
    padding: 10px 20px;
    border: 1px solid var(--blue);
    background: transparent;
    color: var(--blue);
    cursor: pointer;
    border-radius: 8px;
    transition: 0.3s;
}

nav button:hover, nav button.active {
    background: var(--blue);
    color: black;
    box-shadow: 0 0 20px var(--blue);
}

/* SECCIONES */
.section {
    display: none;
    margin: 40px auto;
    max-width: 800px;
    padding: 30px;
    border-radius: 20px;
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(20px);
    border: 1px solid rgba(255,255,255,0.1);
    text-align: center;
    animation: fade 0.5s;
}

.active-section {
    display: block;
}

h1 { color: var(--blue); text-shadow: 0 0 20px var(--blue); }
h2 { color: var(--pink); }

/* BOTONES */
.btn {
    padding: 12px 30px;
    border: none;
    border-radius: 10px;
    margin-top: 20px;
    cursor: pointer;
    font-weight: bold;
    transition: 0.3s;
}

.btn-blue { background: var(--blue); color: black; }
.btn-pink { background: var(--pink); color: white; }

.btn:hover {
    transform: scale(1.1);
    box-shadow: 0 0 20px white;
}

/* ANIMACIONES */
@keyframes fade {
    from {opacity:0; transform: translateY(20px);}
    to {opacity:1;}
}

.rocket {
    font-size: 4rem;
    animation: float 2s infinite ease-in-out;
}

@keyframes float {
    0%,100% {transform: translateY(0);}
    50% {transform: translateY(-10px);}
}
</style>
</head>

<body>

<canvas id="stars"></canvas>

<nav>
<button onclick="tab('inicio')" id="b-inicio" class="active">Inicio</button>
<button onclick="tab('descargas')" id="b-descargas">Descargas</button>
<button onclick="tab('donaciones')" id="b-donaciones">Donaciones</button>
</nav>

<div id="inicio" class="section active-section">
<h1>🚀 SPACE BATTLE X</h1>
<p>Sobrevive, mejora tu nave y domina el espacio.</p>
<div class="rocket">🚀</div>
</div>

<div id="descargas" class="section">
<h2>📥 Descargar Juego</h2>
<p>Versión completa lista para jugar.</p>

<button onclick="downloadGame()" class="btn btn-blue">
DESCARGAR SPACE BATTLE X
</button>
</div>

<div id="donaciones" class="section">
<h2>☕ Apoya el proyecto</h2>
<p>Ayuda a mejorar el juego sin anuncios.</p>

<a href="https://paypal.me" target="_blank">
<button class="btn btn-pink">DONAR</button>
</a>
</div>

<script>
function tab(id){
    document.querySelectorAll('.section').forEach(s=>s.classList.remove('active-section'));
    document.querySelectorAll('nav button').forEach(b=>b.classList.remove('active'));

    document.getElementById(id).classList.add('active-section');
    document.getElementById('b-'+id).classList.add('active');
}

/* 🌠 FONDO ESTRELLAS */
const canvas = document.getElementById("stars");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let stars = [];

for(let i=0;i<120;i++){
    stars.push({
        x: Math.random()*canvas.width,
        y: Math.random()*canvas.height,
        size: Math.random()*2
    });
}

function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);

    ctx.fillStyle = "white";
    stars.forEach(s=>{
        ctx.beginPath();
        ctx.arc(s.x,s.y,s.size,0,Math.PI*2);
        ctx.fill();

        s.y += 0.3;
        if(s.y > canvas.height) s.y = 0;
    });

    requestAnimationFrame(draw);
}
draw();

/* 📥 DESCARGA DEL JUEGO */
function downloadGame() {
    const content = `PEGA_AQUI_TU_JUEGO`;

    const blob = new Blob([content], { type: "text/html" });
    const link = document.createElement("a");

    link.href = URL.createObjectURL(blob);
    link.download = "Space_Battle_X.html";
    link.click();
}
</script>

</body>
</html>
