<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Space Battle X</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- FUENTE PRO -->
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

  <style>
    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      background: black;
      color: white;
      font-family: 'Orbitron', sans-serif;
    }

    nav {
      position: fixed;
      top: 0;
      width: 100%;
      display: flex;
      justify-content: center;
      gap: 10px;
      padding: 10px;
      background: rgba(0,0,0,0.7);
      z-index: 10;
    }

    nav button {
      background: transparent;
      border: 2px solid cyan;
      color: cyan;
      padding: 8px 16px;
      border-radius: 10px;
      cursor: pointer;
      transition: 0.3s;
    }

    nav button:hover {
      background: cyan;
      color: black;
    }

    section {
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
    }

    h1 {
      color: cyan;
      text-shadow: 0 0 15px cyan;
    }

    .btn {
      margin-top: 20px;
      padding: 12px 20px;
      border-radius: 20px;
      border: none;
      cursor: pointer;
      font-weight: bold;
      transition: 0.3s;
    }

    .descargar {
      background: cyan;
      color: black;
    }

    .donar {
      background: magenta;
      color: white;
    }

    .btn:hover {
      transform: scale(1.1);
    }
  </style>
</head>

<body>

  <!-- MENÚ -->
  <nav>
    <button onclick="ir('inicio')">Inicio</button>
    <button onclick="ir('descargas')">Descargas</button>
    <button onclick="ir('donaciones')">Donaciones</button>
  </nav>

  <!-- INICIO -->
  <section id="inicio">
    <h1>🚀 SPACE BATTLE X</h1>
    <p>Sobrevive, mejora tu nave y domina el espacio.</p>

    <button class="btn descargar" onclick="ir('descargas')">DESCARGAR</button>
    <button class="btn donar" onclick="ir('donaciones')">DONAR</button>
  </section>

  <!-- DESCARGAS -->
  <section id="descargas">
    <h1>📥 DESCARGAS</h1>
    <p>Descarga el juego aquí 👇</p>

    <!-- BOTÓN REAL DE DESCARGA -->
    <a href="https://villaguer32.github.io/Battle_space_X/BATTLE_SPACE_X.html" download style="text-decoration:none;">
      <button class="btn descargar">DESCARGAR JUEGO 🚀</button>
    </a>
  </section>

  <!-- DONACIONES -->
  <section id="donaciones">
    <h1>💖 DONACIONES</h1>
    <p>Apoya el desarrollo del juego 🚀</p>
  </section>

  <!-- SCRIPT -->
  <script>
    function ir(seccion) {
      document.getElementById(seccion).scrollIntoView();
    }
  </script>

</body>
</html>
